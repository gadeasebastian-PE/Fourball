<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Golf Fourball - La Carolina</title>
    <style>
        :root {
            --verde-golf: #2D5A27;
            --verde-claro: #E8F5E9;
            --gris-fondo: #F4F7F6;
            --blanco: #ffffff;
            --texto: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--gris-fondo);
            margin: 0;
            padding: 10px;
            color: var(--texto);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita el scroll general */
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            margin: auto;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Pantallas */
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }

        h1 { color: var(--verde-golf); text-align: center; margin: 5px 0; font-size: 1.4rem; }
        h2 { color: var(--verde-golf); font-size: 1rem; margin: 5px 0; text-align: center; }

        /* Tarjetas Compactas */
        .card {
            background: var(--blanco);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .input-group { margin-bottom: 8px; }
        label { display: block; font-size: 0.75rem; color: #666; margin-bottom: 2px; font-weight: bold; }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .row { display: flex; gap: 8px; }
        .flex-2 { flex: 2; }
        .flex-1 { flex: 1; }

        .btn {
            background: var(--verde-golf);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Estilos Juego Compacto */
        .header-status {
            background: var(--verde-golf);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 10px;
        }

        .hole-info { font-size: 0.8rem; opacity: 0.9; }
        .match-score { font-size: 1.4rem; font-weight: bold; margin: 4px 0; }

        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .player-name { font-size: 0.85rem; font-weight: 500; }
        .player-hcp-tag { font-size: 0.65rem; background: var(--verde-claro); color: var(--verde-golf); padding: 1px 4px; border-radius: 3px; margin-left: 4px; }

        .score-input {
            width: 45px;
            padding: 6px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #ccc;
        }

        .net-score {
            font-size: 0.85rem;
            color: var(--verde-golf);
            font-weight: bold;
            width: 25px;
            text-align: center;
            margin-right: 5px;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 10px 0;
            text-align: center;
            font-size: 0.65rem;
            color: #999;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="app-container">

    <div id="setup-screen" class="screen active">
        <h1>Mi Golf <span style="font-weight: 100;">Fourball</span></h1>

        <div class="card">
            <input type="text" id="team1-name" value="Equipo 1" style="font-weight:bold; margin-bottom:8px; border:none; background:#f9f9f9;">
            <div class="row">
                <div class="input-group flex-2"><input type="text" id="p1-name" placeholder="Jugador 1"></div>
                <div class="input-group flex-1"><input type="number" id="p1-hcp" placeholder="HCP"></div>
            </div>
            <div class="row">
                <div class="input-group flex-2"><input type="text" id="p2-name" placeholder="Jugador 2"></div>
                <div class="input-group flex-1"><input type="number" id="p2-hcp" placeholder="HCP"></div>
            </div>
        </div>

        <div class="card">
            <input type="text" id="team2-name" value="Equipo 2" style="font-weight:bold; margin-bottom:8px; border:none; background:#f9f9f9;">
            <div class="row">
                <div class="input-group flex-2"><input type="text" id="p3-name" placeholder="Jugador 3"></div>
                <div class="input-group flex-1"><input type="number" id="p3-hcp" placeholder="HCP"></div>
            </div>
            <div class="row">
                <div class="input-group flex-2"><input type="text" id="p4-name" placeholder="Jugador 4"></div>
                <div class="input-group flex-1"><input type="number" id="p4-hcp" placeholder="HCP"></div>
            </div>
        </div>

        <button class="btn" onclick="iniciarJuego()">Comenzar Partido</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="header-status">
            <div class="hole-info" id="hole-desc">HOYO 1 - PAR 4 (HCP 1)</div>
            <div class="match-score" id="status-display">ALL SQUARE</div>
        </div>

        <div class="card" style="flex-grow: 0;">
            <h3 id="display-team1" style="margin:0 0 5px 0; font-size: 0.9rem; color:var(--verde-golf)">Equipo 1</h3>
            <div class="player-row">
                <div><span class="player-name" id="label-p1">P1</span><span class="player-hcp-tag" id="tag-p1">H0</span></div>
                <div style="display:flex; align-items:center;">
                    <span class="net-score" id="net-p1">-</span>
                    <input type="number" class="score-input" id="score-p1" placeholder="G" oninput="calcularNetos()" inputmode="numeric">
                </div>
            </div>
            <div class="player-row">
                <div><span class="player-name" id="label-p2">P2</span><span class="player-hcp-tag" id="tag-p2">H0</span></div>
                <div style="display:flex; align-items:center;">
                    <span class="net-score" id="net-p2">-</span>
                    <input type="number" class="score-input" id="score-p2" placeholder="G" oninput="calcularNetos()" inputmode="numeric">
                </div>
            </div>

            <h3 id="display-team2" style="margin:10px 0 5px 0; font-size: 0.9rem; color:var(--verde-golf)">Equipo 2</h3>
            <div class="player-row">
                <div><span class="player-name" id="label-p3">P3</span><span class="player-hcp-tag" id="tag-p3">H0</span></div>
                <div style="display:flex; align-items:center;">
                    <span class="net-score" id="net-p3">-</span>
                    <input type="number" class="score-input" id="score-p3" placeholder="G" oninput="calcularNetos()" inputmode="numeric">
                </div>
            </div>
            <div class="player-row" style="border:none">
                <div><span class="player-name" id="label-p4">P4</span><span class="player-hcp-tag" id="tag-p4">H0</span></div>
                <div style="display:flex; align-items:center;">
                    <span class="net-score" id="net-p4">-</span>
                    <input type="number" class="score-input" id="score-p4" placeholder="G" oninput="calcularNetos()" inputmode="numeric">
                </div>
            </div>
        </div>

        <button class="btn" onclick="siguienteHoyo()">Siguiente Hoyo</button>
    </div>

    <footer>
        Version para iPhone<br>
        Desarrollador: Mi Golf Team | Colaborador: Gemini
    </footer>
</div>

<script>
    const canchaLaCarolina = [
        {par: 4, hcp: 7}, {par: 3, hcp: 17}, {par: 4, hcp: 1}, {par: 5, hcp: 13},
        {par: 4, hcp: 5}, {par: 4, hcp: 11}, {par: 3, hcp: 15}, {par: 4, hcp: 3}, {par: 5, hcp: 9},
        {par: 4, hcp: 8}, {par: 4, hcp: 2}, {par: 3, hcp: 16}, {par: 5, hcp: 14},
        {par: 4, hcp: 6}, {par: 4, hcp: 12}, {par: 3, hcp: 18}, {par: 4, hcp: 4}, {par: 5, hcp: 10}
    ];

    let jugadores = [];
    let equipo1Name = "";
    let equipo2Name = "";
    let hoyoActual = 1;
    let balance = 0;

    function iniciarJuego() {
        equipo1Name = document.getElementById('team1-name').value || "Equipo 1";
        equipo2Name = document.getElementById('team2-name').value || "Equipo 2";

        jugadores = [
            { name: document.getElementById('p1-name').value || "J1", hcp: parseInt(document.getElementById('p1-hcp').value) || 0 },
            { name: document.getElementById('p2-name').value || "J2", hcp: parseInt(document.getElementById('p2-hcp').value) || 0 },
            { name: document.getElementById('p3-name').value || "J3", hcp: parseInt(document.getElementById('p3-hcp').value) || 0 },
            { name: document.getElementById('p4-name').value || "J4", hcp: parseInt(document.getElementById('p4-hcp').value) || 0 }
        ];

        document.getElementById('display-team1').innerText = equipo1Name;
        document.getElementById('display-team2').innerText = equipo2Name;

        for(let i=1; i<=4; i++) {
            document.getElementById(`label-p${i}`).innerText = jugadores[i-1].name;
            document.getElementById(`tag-p${i}`).innerText = `H${jugadores[i-1].hcp}`;
        }

        actualizarHoyoInfo();
        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
    }

    function actualizarHoyoInfo() {
        const datos = canchaLaCarolina[hoyoActual - 1];
        document.getElementById('hole-desc').innerText = `HOYO ${hoyoActual} - PAR ${datos.par} (HCP ${datos.hcp})`;
    }

    function calcularNetos() {
        const hcpHoyo = canchaLaCarolina[hoyoActual - 1].hcp;
        for(let i=0; i<4; i++) {
            const val = document.getElementById(`score-p${i+1}`).value;
            const scoreGross = parseInt(val);
            if(!isNaN(scoreGross) && val !== "") {
                let golpesRecibidos = 0;
                if (jugadores[i].hcp >= hcpHoyo) golpesRecibidos = 1;
                if (jugadores[i].hcp >= (hcpHoyo + 18)) golpesRecibidos = 2;
                document.getElementById(`net-p${i+1}`).innerText = scoreGross - golpesRecibidos;
            } else {
                document.getElementById(`net-p${i+1}`).innerText = "-";
            }
        }
    }

    function siguienteHoyo() {
        const n1 = parseInt(document.getElementById('net-p1').innerText) || 99;
        const n2 = parseInt(document.getElementById('net-p2').innerText) || 99;
        const n3 = parseInt(document.getElementById('net-p3').innerText) || 99;
        const n4 = parseInt(document.getElementById('net-p4').innerText) || 99;

        const mejorE1 = Math.min(n1, n2);
        const mejorE2 = Math.min(n3, n4);

        if (mejorE1 < mejorE2) balance++;
        else if (mejorE2 < mejorE1) balance--;

        actualizarStatusMatch();

        if(hoyoActual < 18) {
            hoyoActual++;
            actualizarHoyoInfo();
            for(let i=1; i<=4; i++) {
                document.getElementById(`score-p${i}`).value = "";
                document.getElementById(`net-p${i}`).innerText = "-";
            }
        } else {
            alert("Ronda finalizada");
        }
    }

    function actualizarStatusMatch() {
        const display = document.getElementById('status-display');
        if(balance === 0) display.innerText = "ALL SQUARE";
        else if (balance > 0) display.innerText = `${equipo1Name} ${balance} UP`;
        else display.innerText = `${equipo2Name} ${Math.abs(balance)} UP`;
    }
</script>

</body>
</html>
